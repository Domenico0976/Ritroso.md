# ==============================================================
# SKILL: context-mapper.yaml
# Automatic mapping of available project resources
# ==============================================================

name: context-mapper
version: "2.0.0"
description: |
  Auxiliary skill for Ritroso.md.
  Scans the workspace to identify all resources useful
  to the model for expanding the project context.
  In v2: also detects context gaps and feeds them to
  the inference loop before generation.
author: Domenico Fusto
tags: [context, resources, mapping, files, llm-skill, inference, gaps]

# --------------------------------------------------------------
# SCAN CONFIGURATION
# --------------------------------------------------------------
config:
  scan_depth: 3
  ignore_folders:
    - node_modules
    - .git
    - dist
    - build
    - .next
    - __pycache__
  ignore_files:
    - "*.lock"
    - "*.log"
    - ".DS_Store"

# --------------------------------------------------------------
# RESOURCE TYPES AND CONTEXT WEIGHT
# --------------------------------------------------------------
resource_types:
  - type: markdown
    extensions: [".md", ".mdx"]
    context_weight: HIGH
    action: read_and_summarize
    description: "Documentation, notes, existing specifications"

  - type: source_code
    extensions: [".ts", ".tsx", ".js", ".jsx", ".py", ".php", ".css", ".scss"]
    context_weight: HIGH
    action: extract_structure
    description: "Function structure, types, components, API"

  - type: config
    extensions: [".json", ".yaml", ".yml", ".toml", ".env.example"]
    context_weight: MEDIUM
    action: read_keys
    description: "Configurations, dependencies, environment variables"

  - type: image
    extensions: [".png", ".jpg", ".jpeg", ".svg", ".webp"]
    context_weight: MEDIUM
    action: note_presence
    description: "Visual assets, screenshots, wireframes"

  - type: document
    extensions: [".pdf"]
    context_weight: MEDIUM
    action: note_presence_request_summary
    description: "Specification documents, contracts, briefs"

  - type: video
    extensions: [".mp4", ".mov", ".avi", ".webm"]
    context_weight: LOW
    action: note_presence
    description: "Demos, tutorials, recordings"

  - type: data
    extensions: [".csv", ".xlsx", ".sql"]
    context_weight: MEDIUM
    action: read_schema
    description: "Data structures, database, spreadsheets"

# --------------------------------------------------------------
# OUTPUT STRUCTURE
# --------------------------------------------------------------
output:
  format: structured_map
  sections:
    - name: "RESOURCES_FOUND"
      content: "List of all resources with type, path and estimated relevance"

    - name: "CRITICAL_RESOURCES"
      content: "Top 5 most relevant resources for the prompt context"

    - name: "CONTEXT_GAPS"
      content: "What is missing: resources expected but not present"

    - name: "INFERRED_SIGNALS"
      content: "What the model can infer from existing resources (even without explicit statements)"

    - name: "RECOMMENDATIONS"
      content: "Suggestions to the model on what to read before generating"

# --------------------------------------------------------------
# INTERNAL LOGIC
# --------------------------------------------------------------
internal_logic:
  description: |
    The mapper does not just list files — it reasons about relevance.
    For each resource it evaluates:
    - Is it relevant to the prompt domain? (dev, design, business...)
    - Does it contain already-defined constraints or requirements?
    - Does it contradict something in the user prompt?
    - Does it add context the model did not have?

    Resources with context_weight=HIGH are processed first.
    The mapper produces an "initial picture" that is passed to the ritroso skill
    as input for generating the .md file.

  gap_detection:
    description: |
      After mapping resources, the mapper identifies GAPS:
      dimensions that are expected for the domain but have no coverage.
      These gaps are passed to the context-gap-questions protocol.
    gap_types:
      - type: goal_gap
        description: "No file or signal defines WHY the project exists"
      - type: constraint_gap
        description: "No technical, economic or time limits declared"
      - type: antipattern_gap
        description: "No known failure modes or things-to-avoid defined"
      - type: user_gap
        description: "No user types, personas or actors defined"
      - type: stack_gap
        description: "No technology stack or architecture declared"
